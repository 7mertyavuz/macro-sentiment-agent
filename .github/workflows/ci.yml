name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (coverage)
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci_test.db
          QUEUE_BACKEND: memory
          USE_FINBERT: "false"
        run: pytest --cov=macro_sentiment --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src tests

      - name: ruff format --check
        run: ruff format --check src tests
        continue-on-error: true  # MVP: mevcut kod tabanı henüz ruff-format uyumlu değil (kademeli geçiş, RUNBOOK.md)

      - name: mypy
        run: mypy src
        continue-on-error: true  # MVP: tip hataları henüz engelleyici değil (bkz. docs/RUNBOOK.md)

  security:
    name: dependency + secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit

      - name: pip-audit (bilinen CVE'ler için bağımlılık taraması)
        run: pip-audit --strict
        continue-on-error: true  # MVP: bilinen üçüncü-taraf açıkları PR'ı henüz engellemez, rapor edilir

      - name: Hardcoded secret / anahtar taraması
        run: python scripts/check_secrets.py

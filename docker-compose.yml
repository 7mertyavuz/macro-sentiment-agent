# Faz 0/1 yerel geliştirme altyapısı.
# Postgres (TimescaleDB) + Redis. API ve worker uygulama tarafında çalışır.
services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: msa
      POSTGRES_PASSWORD: msa
      POSTGRES_DB: macro_sentiment
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # TODO(Faz 1): api ve worker servislerini ekle
  # api:
  #   build: .
  #   command: uvicorn macro_sentiment.api.main:app --host 0.0.0.0 --port 8000
  #   env_file: .env
  #   depends_on: [db, redis]
  #   ports: ["8000:8000"]

volumes:
  pgdata:
